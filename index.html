<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GREEN-API</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      padding: 30px;
      background: #fff;
      color: #222;
    }

    .layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 280px;
      flex-shrink: 0;
    }

    .controls input,
    .controls textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .controls textarea {
      resize: vertical;
      min-height: 70px;
    }

    .controls input:focus,
    .controls textarea:focus {
      border-color: #888;
    }

    .controls button {
      width: 100%;
      padding: 9px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .controls button:hover {
      background: #f5f5f5;
    }

    .controls button:active {
      background: #ebebeb;
    }

    .divider {
      height: 16px;
    }

    .response-area {
      flex: 1;
    }

    .response-area label {
      display: block;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .response-area textarea {
      width: 100%;
      height: 220px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
      resize: vertical;
      outline: none;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="controls">
      <input type="text" id="idInstance" placeholder="idInstance" />
      <input type="password" id="apiTokenInstance" placeholder="ApiTokenInstance" />

      <div class="divider"></div>

      <button onclick="getSettings()">getSettings</button>
      <button onclick="getStateInstance()">getStateInstance</button>

      <div class="divider"></div>

      <input type="text" id="sendMessagePhone" placeholder="77771234567" />
      <textarea id="sendMessageText" placeholder="Hello World!"></textarea>
      <button onclick="sendMessage()">sendMessage</button>

      <div class="divider"></div>

      <input type="text" id="sendFilePhone" placeholder="77771234567" />
      <input type="text" id="sendFileUrl" placeholder="https://my.site.com/img/horse.png" />
      <button onclick="sendFileByUrl()">sendFileByUrl</button>
    </div>

    <div class="response-area">
      <label>Ответ:</label>
      <textarea id="response" readonly></textarea>
    </div>
  </div>

  <script>
    const BASE_URL = 'https://api.green-api.com';

    function getInstance() {
      return {
        id: document.getElementById('idInstance').value.trim(),
        token: document.getElementById('apiTokenInstance').value.trim(),
      };
    }

    function showResponse(data) {
      document.getElementById('response').value = JSON.stringify(data, null, 4);
    }

    async function getSettings() {
      const { id, token } = getInstance();
      const res = await fetch(`${BASE_URL}/waInstance${id}/getSettings/${token}`);
      const data = await res.json();
      showResponse(data);
    }

    async function getStateInstance() {
      const { id, token } = getInstance();
      const res = await fetch(`${BASE_URL}/waInstance${id}/getStateInstance/${token}`);
      const data = await res.json();
      showResponse(data);
    }

    async function sendMessage() {
      const { id, token } = getInstance();
      const phone = document.getElementById('sendMessagePhone').value.trim();
      const message = document.getElementById('sendMessageText').value.trim();

      const res = await fetch(`${BASE_URL}/waInstance${id}/sendMessage/${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chatId: `${phone}@c.us`,
          message,
        }),
      });
      const data = await res.json();
      showResponse(data);
    }

    async function sendFileByUrl() {
      const { id, token } = getInstance();
      const phone = document.getElementById('sendFilePhone').value.trim();
      const url = document.getElementById('sendFileUrl').value.trim();

      const res = await fetch(`${BASE_URL}/waInstance${id}/sendFileByUrl/${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chatId: `${phone}@c.us`,
          urlFile: url,
          fileName: url.split('/').pop(),
        }),
      });
      const data = await res.json();
      showResponse(data);
    }
  </script>
</body>
</html>
